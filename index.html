const SEED_ENTRIES = [
  {
    "id": "chapter-1-empat-menara",
    "chapter": 1,
    "title_id": "Empat Menara",
    "title_en": "The Four Towers",
    "content_id": "# Chapter 1 — Empat Menara\n\n> *“Aku hanya ingin mencoba memasuki portal itu. Tapi dunia di baliknya ternyata menyimpan perjalanan yang jauh lebih besar.”*\n\nDi dunia itu, aku adalah seorang **Hunter**.\n\nAku tinggal bersama dua orang: seorang laki-laki yang menjadi partner berburu sekaligus teman dekatku, dan adik perempuannya. Kami bukan keluarga. Aku hanyalah orang asing yang tinggal bersama mereka, tetapi entah sejak kapan rumah itu terasa seperti tempatku pulang.\n\nHubunganku dengan adik perempuan itu juga sangat dekat. Tidak pernah ada pengakuan cinta di antara kami, tetapi ada perasaan yang tumbuh secara perlahan.\n\nSaat itu, aku dan partnerku dikenal sebagai **Hunter Rank C**.\n\nNamun ada satu rahasia yang kusimpan rapat.\n\nAku memiliki dua kartu identitas Hunter.\n\nSatu kartu menunjukkan Rank C, seperti yang diketahui semua orang. Sedangkan kartu yang lain menunjukkan bahwa aku sebenarnya adalah **Hunter Rank A**.\n\n***\n\nSuatu hari, sebuah portal muncul.\n\nPortal itu menghubungkan dunia kami dengan dunia lain, dan hanya Hunter **Rank A** yang dapat memasukinya. Semua orang mengira aku tidak memenuhi syarat.\n\nSebelum berangkat, aku berpamitan kepada mereka berdua. Aku hanya mengatakan ingin mencoba sesuatu. Aku tidak pernah mengungkapkan rahasia tentang kartu Rank A milikku.\n\nBegitu melewatinya, sebuah suara terdengar di telingaku.\n\n*“Perjalanan ini selesai jika kau berhasil mencapai bagian atas empat menara di masing-masing benua dunia ini.”*\n\nSesaat kemudian, aku diteleportasi ke sebuah wilayah yang seluruhnya diselimuti warna hitam.\n\nTanahnya hitam. Batu-batunya hitam. Bangunannya hitam. Bahkan langitnya tampak seperti malam yang tak pernah berakhir.\n\nDi sana aku bertemu seorang pria yang menawarkan diri menjadi pemandu menuju menara pertama.\n\nSelama perjalanan, ia menjelaskan sedikit tentang dunia tersebut. Selain wilayah kegelapan tempatku berada, masih ada benua lain: wilayah api, wilayah yang dipenuhi cahaya terang, dan satu wilayah lain yang samar-samar kuingat, kemungkinan adalah wilayah air.\n\nDi tengah jalan, ia mengajakku melewati sebuah tempat terbuka.\n\nDi sana berjajar banyak sekali ranjang kayu berwarna hitam. Bentuknya sederhana, tinggi, dan datar, menyerupai tempat tidur rumah sakit kuno.\n\nPemandu itu menjelaskan bahwa tempat itu adalah tempat semua korban pembunuhan dibaringkan, dan arwah mereka masih tertinggal di sana.\n\nKarena penasaran, aku mendekati salah satu ranjang.\n\nBegitu aku melangkah semakin dekat, arwah-arwah mulai bermunculan. Mereka bangkit satu per satu, lalu langsung menyerangku.\n\nAku berusaha melawan, tetapi jumlah mereka terlalu banyak.\n\nDi tengah kekacauan itu, muncul satu arwah dengan aura yang jauh lebih mengerikan daripada yang lain.\n\n*“Itu arwah sang pembunuh...”*\n\nBegitu arwah itu melihatku, kemarahannya langsung meledak.\n\n*“Lari!”* teriak sang pemandu.\n\nAku pun berlari secepat mungkin menuju menara hitam yang menjulang di kejauhan. Jeritan para arwah terus terdengar di belakangku.\n\nAkhirnya aku berhasil mencapai gerbang menara.\n\nBegitu melewati ambangnya, seluruh suara mendadak lenyap.\n\nAku menoleh ke belakang.\n\nTak ada lagi arwah. Tak ada lagi kejaran.\n\nDan pemandu yang sejak tadi menemaniku juga telah menghilang tanpa jejak.\n\nKini hanya ada aku seorang diri, berdiri di hadapan menara hitam pertama.",
    "content_en": "# Chapter 1 — The Four Towers\n\n> *“I only wanted to try entering the portal. But the world beyond it held a journey far greater than I expected.”*\n\nIn that world, I was a **Hunter**.\n\nI lived with two people: a man who was both my hunting partner and close friend, and his younger sister. We were not family. I was only a stranger staying with them, yet at some point, that house began to feel like a place I could return to.\n\nI was also very close to his younger sister. There was never a confession of love between us, but something had slowly begun to grow.\n\nAt the time, my partner and I were known as **Rank C Hunters**.\n\nBut I kept one secret hidden.\n\nI had two Hunter identity cards.\n\nOne card showed Rank C, the rank everyone knew me by. The other showed the truth.\n\nI was actually a **Rank A Hunter**.\n\n***\n\nOne day, a portal appeared.\n\nIt connected our world to another, and only **Rank A Hunters** were allowed to enter. Everyone assumed I did not meet the requirement.\n\nBefore leaving, I said goodbye to the two of them. I only told them I wanted to try something. I never revealed the secret of my Rank A card.\n\nThe moment I stepped through, a voice sounded in my ear.\n\n*“This journey will be completed once you reach the top of the four towers standing on each continent of this world.”*\n\nA moment later, I was teleported to a land covered entirely in black.\n\nThe ground was black. The stones were black. The buildings were black. Even the sky looked like a night that would never end.\n\nThere, I met a man who offered to guide me to the first tower.\n\nAs we walked, he explained a little about that world. Besides the land of darkness where I had arrived, there were other continents: a land of fire, a land filled with blinding light, and one more place I vaguely remembered—possibly a land of water.\n\nAlong the way, he led me through an open area.\n\nRows of black wooden beds stood there. They were simple, tall, and flat, resembling old hospital beds.\n\nThe guide explained that it was the place where the victims of a massacre had been laid, and that their spirits still lingered there.\n\nOut of curiosity, I approached one of the beds.\n\nThe moment I stepped closer, spirits began to emerge. One by one, they rose and attacked me.\n\nI tried to fight them off, but there were too many.\n\nThen, amid the chaos, one spirit appeared with an aura far more terrifying than the rest.\n\n*“That is the spirit of the murderer...”*\n\nThe instant it saw me, its rage exploded.\n\n*“Run!”* the guide shouted.\n\nI ran as fast as I could toward the black tower looming in the distance. The screams of the spirits echoed behind me.\n\nAt last, I reached the tower gate.\n\nThe moment I crossed its threshold, every sound vanished.\n\nI looked back.\n\nNo spirits.\n\nNo pursuit.\n\nAnd the guide who had been with me...\n\nhad disappeared without a trace.\n\nNow I stood alone before the first black tower."
  },
  {
    "id": "chapter-2-benua-peta",
    "chapter": 2,
    "title_id": "Benua yang Tidak Ada di Peta",
    "title_en": "The Continent That Wasn't on the Map",
    "content_id": "# Chapter 2 — Benua yang Tidak Ada di Peta\n\n> *“Awalnya kami mengira hanya tersesat. Lalu peta itu membuktikan bahwa yang salah bukan arah kami, melainkan dunia yang kami pijak.”*\n\nMimpi ini dimulai dengan sesuatu yang aneh.\n\nAku berada di dalam sebuah pesawat.\n\nYang membuatnya terasa unik adalah, saat mengalami mimpi itu, aku bahkan belum pernah sekalipun menaiki pesawat di kehidupan nyata. Namun di dalam mimpi, semuanya terasa begitu alami.\n\nTiba-tiba pesawat mengalami kecelakaan.\n\nEntah bagaimana, aku berhasil selamat bersama beberapa penumpang lainnya.\n\nKami kini terdampar di tempat yang sama sekali asing.\n\nTidak lama kemudian, kami bertemu dengan penduduk setempat. Mereka menerima kami dengan ramah dan berusaha membantu, meskipun kami sama sekali tidak memahami bahasa yang mereka gunakan.\n\nMereka menyuguhkan makanan sebagai tanda sambutan.\n\nNamun ketika kami mencicipinya, rasanya benar-benar hambar.\n\nUntungnya, di antara para penyintas terdapat seorang koki. Kami pun membagi tugas agar dapat bertahan hidup.\n\nSang koki bertanggung jawab mencari cara mengolah bahan makanan lokal agar bisa dinikmati. Sementara aku memilih menjelajahi lingkungan sekitar dan mencari tahu sebenarnya di mana kami berada.\n\n***\n\nPemandangan di dunia itu benar-benar memukau.\n\nDi hadapanku terbentang padang rumput yang sangat luas, sejauh mata memandang. Anehnya, rumput di sana bukan berwarna hijau seperti yang biasa kulihat di Bumi, melainkan **kuning keemasan**.\n\nDi balik hamparan padang rumput itu, berdiri sebuah hutan raksasa.\n\nDari kejauhan saja pohon-pohonnya tampak menjulang luar biasa tinggi. Batangnya besar, rapat, dan seolah membentuk tembok alam yang memisahkan dunia luar dengan sesuatu yang tersembunyi di dalamnya.\n\nAnehnya lagi, aku membawa sebuah tablet.\n\nPadahal di dunia nyata, saat mimpi itu terjadi, aku bahkan belum pernah memiliki atau menggunakan tablet.\n\nDengan tablet tersebut aku mulai mencatat dan memetakan wilayah sekitar.\n\nDari penduduk lokal, akhirnya aku memperoleh sebuah peta.\n\nAwalnya aku hanya ingin mengetahui kami berada di benua mana agar bisa memikirkan cara pulang.\n\nNamun saat melihat peta itu, ada sesuatu yang terasa janggal.\n\nNama benuanya benar-benar asing.\n\nAku mengenali benua-benua lainnya, tetapi yang satu ini belum pernah kulihat sebelumnya.\n\nAku segera membuka peta dunia yang tersimpan di tabletku.\n\nLalu, tanpa sadar, aku mulai membandingkan kedua peta itu berkali-kali.\n\nSemua benua yang selama ini kukenal masih ada.\n\nGaris pantainya hampir sama.\nPegunungannya berada di tempat yang sama.\nBahkan sebagian besar lautan tampak begitu mirip.\n\nNamun semakin lama kuperhatikan, semakin banyak perbedaan kecil yang mulai terlihat.\n\nBeberapa hutan membentang jauh lebih luas.\n\nAda pegunungan yang bentuknya berbeda.\n\nDan beberapa wilayah memiliki bentang alam yang sama sekali belum pernah kulihat.\n\nSeolah-olah dunia ini adalah salinan dari duniaku...\n\ntetapi berkembang dengan sejarah yang berbeda.\n\nLalu pandanganku berhenti pada satu hal.\n\n**Benua tempat kami berdiri... tidak pernah ada di petaku.**\n\nAku hanya bisa menatap kedua peta itu dalam diam.\n\nSedikit demi sedikit, sebuah kemungkinan yang mengerikan mulai memenuhi pikiranku.\n\nKami bukan tersesat di wilayah yang belum pernah dipetakan.\n\nKami juga bukan menemukan sebuah benua baru.\n\n**Kami berada di planet lain.**\n\nDi sisi lain, sang koki akhirnya berhasil membuat terobosan kecil. Setelah menemukan garam, ia membuat hidangan pertama yang benar-benar memiliki rasa: **telur gulung**.\n\nDan sejak hari itu, kami tidak lagi sekadar bertahan hidup.\n\nKami mulai belajar hidup di dunia yang bukan milik kami... sambil terus mencari jalan untuk kembali ke rumah.",
    "content_en": "# Chapter 2 — The Continent That Wasn't on the Map\n\n> *“At first, we thought we were merely lost. Then the map proved that the problem was not our direction, but the world beneath our feet.”*\n\nThis dream began with something strange.\n\nI was inside an airplane.\n\nWhat made it feel unusual was that, at the time I had this dream, I had never once boarded an airplane in real life. Yet inside the dream, everything felt completely natural.\n\nSuddenly, the plane crashed.\n\nSomehow, I survived along with several other passengers.\n\nWe were now stranded in a place none of us recognized.\n\nBefore long, we encountered the local people. They welcomed us kindly and tried to help, even though we could not understand their language at all.\n\nThey offered us food as a sign of hospitality.\n\nBut when we tasted it, it was completely bland.\n\nFortunately, one of the survivors was a chef. We divided our roles so we could survive.\n\nThe chef focused on finding ways to turn local ingredients into proper meals. Meanwhile, I chose to explore the surrounding area and figure out where we really were.\n\n***\n\nThe scenery in that world was breathtaking.\n\nBefore me stretched a vast grassland, extending as far as the eye could see. Strangely, the grass was not green like the grass I knew on Earth, but **golden yellow**.\n\nBeyond the grassland stood a gigantic forest.\n\nEven from afar, the trees looked impossibly tall. Their trunks were massive and densely packed, like a natural wall separating the outside world from whatever lay hidden inside.\n\nStrangely enough, I was carrying a tablet.\n\nIn real life, when I had this dream, I had never owned or used a tablet before.\n\nUsing it, I began recording and mapping the surrounding area.\n\nFrom the local people, I eventually obtained a map.\n\nAt first, I only wanted to know which continent we were on so we could start thinking of a way home.\n\nBut when I looked at the map, something felt wrong.\n\nThe continent's name was completely unfamiliar.\n\nI recognized the other continents, but I had never seen this one before.\n\nI immediately opened the world map stored on my tablet.\n\nWithout realizing it, I began comparing the two maps over and over again.\n\nEvery continent I had always known was still there.\n\nThe coastlines were almost identical.\nThe mountain ranges occupied nearly the same places.\nEven most of the surrounding seas looked remarkably familiar.\n\nYet the longer I studied them, the more subtle differences began to reveal themselves.\n\nSome forests stretched far beyond what I remembered.\n\nSeveral mountain ranges were shaped differently.\n\nAnd some regions had landscapes I had never seen before.\n\nIt was as if this world were a copy of my own...\n\nbut one that had developed through a different history.\n\nThen my eyes stopped on a single detail.\n\n**The continent we were standing on... did not exist on my map.**\n\nFor a long moment, I simply stared at both maps in silence.\n\nLittle by little, a terrifying possibility began to take shape in my mind.\n\nWe had not wandered into an unmapped region.\n\nNor had we discovered a new continent.\n\n**We were on another planet.**\n\nMeanwhile, the chef finally made a small breakthrough. After finding salt, he created the first dish that actually had flavor: **rolled eggs**.\n\nFrom that day on, we were no longer merely surviving.\n\nWe began learning how to live in a world that was not ours... while still searching for a way back home."
  },

    "id": "chapter-3-putri-yang-selalu-mati",
    "chapter": 3,
    "title_id": "Putri yang Selalu Mati",
    "title_en": "The Princess Who Kept Dying",
    "content_id": "# Chapter 3 — Putri yang Selalu Mati\n\n> *“Setiap kali aku gagal menyelamatkannya, dunia menarikku kembali ke awal. Tapi rasa sakitnya... tetap terasa nyata.”*\n\nDi mimpi itu, aku menjadi seorang anak kecil.\n\nAku berada di sebuah tempat yang dikelilingi hutan dan pepohonan lebat. Dari suasananya, tempat itu seperti berada di wilayah kerajaan. Ada sistem pemerintahan, ada rakyat, dan ada keluarga bangsawan yang dihormati.\n\nSuatu hari, aku melihat seorang tuan putri kecil.\n\nUsianya kira-kira lima tahun.\n\nIa berjalan sendirian menuju sekolah.\n\nYang aneh, sekolah itu berada jauh di atas pegunungan.\n\nEntah kenapa, aku merasa harus mengikutinya.\n\nAku berjalan beberapa meter di belakangnya, menjaga jarak agar tidak terlihat terlalu mencolok.\n\nNamun baru beberapa saat aku mengikutinya...\n\nDunia tiba-tiba berubah.\n\nSemuanya gelap sesaat.\n\nLalu aku kembali ke titik awal.\n\nSeolah waktu baru saja diulang.\n\nAku mencoba lagi.\n\nAku mengikuti tuan putri itu seperti sebelumnya.\n\nDan lagi-lagi...\n\nAku kembali ke awal.\n\n***\n\nSetelah beberapa kali gagal, aku mencoba mengambil jalur lain.\n\nKupikir mungkin ada batas tertentu yang tidak boleh kulewati, atau ada sesuatu yang memicu dunia ini untuk mengulang waktu.\n\nAku bergerak dari arah berbeda, mencoba memotong jalan.\n\nNamun tidak lama kemudian, sesuatu terjadi tepat di depan mataku.\n\nTuan putri kecil itu jatuh.\n\nKepalanya tertembak.\n\nSeketika aku tahu—atau setidaknya pikiranku langsung menyimpulkan—bahwa itu adalah tembakan dari seorang **sniper**.\n\nPadahal dunia itu terasa seperti zaman kerajaan.\n\nNamun entah bagaimana, keberadaan senjata jarak jauh itu terasa masuk akal di dalam mimpi.\n\nAku berlari menghampirinya secepat mungkin.\n\nTapi sebelum sempat menyentuh tubuhnya...\n\nAku juga tertembak.\n\nRasanya sangat sakit.\n\nBukan sekadar sadar bahwa aku mati.\n\nAku benar-benar merasakan sakitnya peluru menembus tubuhku.\n\nLalu semuanya kembali gelap.\n\nDan aku kembali lagi ke awal.\n\n***\n\nAku mulai memahami aturan dunia itu.\n\nSetiap kali aku mati, aku kembali ke titik awal.\n\nSetiap kali tuan putri itu mati, dunia seolah memaksaku mengulang semuanya lagi.\n\nAnehnya, baru setelah bangun aku sadar bahwa konsep ini mirip dengan cerita *Re:Zero*.\n\nNamun saat mimpi itu terjadi, anime itu bahkan belum sempat ada bagiku.\n\nAku terus mencoba.\n\nAku mengikuti tuan putri itu lagi.\n\nKali ini, ketika ia tertembak, aku tidak langsung menghampirinya. Aku berusaha mencari asal tembakan.\n\nAku berlari menyusuri arah yang kurasa menjadi sumbernya.\n\nAku mencari ke balik pepohonan.\n\nKe arah bukit.\n\nKe tepi jurang.\n\nNamun aku tetap tidak menemukan pelakunya.\n\nKarena tidak tahu harus melakukan apa lagi, aku mengambil keputusan ekstrem.\n\nAku melompat dari tepi jurang.\n\nDunia kembali gelap.\n\nDan seperti sebelumnya...\n\nAku kembali ke awal.\n\n***\n\nKali ini aku mencoba berpikir lebih jauh.\n\nJika aku tidak bisa melihat asal tembakan dengan mata telanjang, berarti aku membutuhkan alat.\n\nAku mulai membuat sesuatu yang mirip teropong dari bambu.\n\nSecara kebetulan, aku menemukan sebuah kaca kecil. Aku merasa kaca itu mungkin terjatuh dari tas tuan putri sebelumnya.\n\nDengan bambu dan kaca itu, aku membuat teropong sederhana.\n\nLalu aku kembali mengikuti alur yang sama.\n\nTuan putri kecil itu berjalan menuju sekolah di pegunungan.\n\nAku menunggu.\n\nDan seperti sebelumnya...\n\nIa tertembak.\n\nNamun kali ini aku sudah siap.\n\nAku mengangkat teropong bambu itu dan mengarahkannya ke pegunungan di seberang.\n\nDi sana, dari kejauhan, aku melihat pantulan cahaya.\n\nKilatan kecil.\n\nSeperti pantulan dari lensa teropong sniper.\n\nAku akhirnya menemukan arah pelakunya.\n\nAda seseorang di bukit gunung sebelah.\n\nTanpa berpikir panjang, aku mencoba mengejarnya.\n\nDengan tubuh anak kecil, aku berlari sekuat yang kubisa.\n\nDi tengah perjalanan, aku menemukan sebuah jalur tali yang menghubungkan satu bukit ke bukit lainnya.\n\nBentuknya seperti **zipline** sederhana—seutas tali yang sudah terpasang melintang, seolah memang digunakan untuk menyeberangi jurang dari satu sisi ke sisi lain.\n\nAku mengambil sepotong kayu, mengaitkannya ke tali itu, lalu mencoba bergelantungan untuk menyeberang.\n\nNamun tubuhku terlalu kecil.\n\nTenagaku tidak cukup.\n\nTanganku mulai lemas.\n\nPeganganku terlepas.\n\nDan aku jatuh.\n\nSayangnya, mimpi itu berakhir di sana.\n\nAku tidak pernah tahu apakah aku berhasil menyelamatkan tuan putri itu.\n\nAku juga tidak pernah tahu siapa sebenarnya penembak dari bukit seberang.\n\nYang kuingat hanya satu hal.\n\nAku pernah berkali-kali kembali ke awal...\n\nDemi mencoba menyelamatkan seorang putri kecil yang selalu mati sebelum sampai ke sekolahnya.",
    "content_en": "# Chapter 3 — The Princess Who Kept Dying\n\n> *“Every time I failed to save her, the world dragged me back to the beginning. But the pain... still felt real.”*\n\nIn that dream, I became a child.\n\nI was in a place surrounded by forests and dense trees. From the atmosphere, it felt like a kingdom. There was a system of rule, there were common people, and there was a royal family held in respect.\n\nOne day, I saw a little princess.\n\nShe looked about five years old.\n\nShe was walking to school alone.\n\nStrangely, her school was somewhere high up in the mountains.\n\nFor some reason, I felt I had to follow her.\n\nI walked several meters behind her, keeping enough distance so I would not seem too obvious.\n\nBut after only a short while...\n\nthe world suddenly changed.\n\nEverything went dark for a moment.\n\nThen I was back at the starting point.\n\nAs if time had just been reset.\n\nI tried again.\n\nI followed the princess the same way as before.\n\nAnd once again...\n\nI returned to the beginning.\n\n***\n\nAfter failing several times, I tried taking a different route.\n\nI thought perhaps there was some kind of boundary I was not allowed to cross, or something that triggered the world to reset.\n\nI moved from another direction, trying to cut across the path.\n\nBut before long, something happened right before my eyes.\n\nThe little princess fell.\n\nShe had been shot in the head.\n\nIn that instant, I knew—or at least my mind immediately concluded—that it was a shot from a **sniper**.\n\nEven though the world felt like an old kingdom, the existence of a long-range weapon somehow made sense inside the dream.\n\nI ran toward her as quickly as I could.\n\nBut before I could reach her body...\n\nI was shot too.\n\nIt hurt.\n\nNot just the awareness that I had died.\n\nI truly felt the pain of the bullet piercing through me.\n\nThen everything went dark again.\n\nAnd I returned to the beginning.\n\n***\n\nI began to understand the rule of that world.\n\nEvery time I died, I returned to the starting point.\n\nEvery time the princess died, the world seemed to force me to repeat everything.\n\nStrangely, only after waking up did I realize that the concept resembled *Re:Zero*.\n\nBut at the time I had the dream, that anime had not even existed for me yet.\n\nI kept trying.\n\nI followed the princess again.\n\nThis time, when she was shot, I did not rush to her immediately. I tried to find where the shot had come from.\n\nI ran in the direction I believed to be the source.\n\nBehind the trees.\n\nToward the hills.\n\nTo the edge of a cliff.\n\nBut I still could not find the attacker.\n\nNot knowing what else to do, I made an extreme decision.\n\nI jumped off the cliff.\n\nThe world went dark.\n\nAnd, just like before...\n\nI returned to the beginning.\n\n***\n\nThis time, I tried to think further ahead.\n\nIf I could not see where the shot came from with my bare eyes, then I needed a tool.\n\nI began making something like a telescope out of bamboo.\n\nBy coincidence, I found a small piece of glass. I felt that it might have fallen from the princess's bag earlier.\n\nUsing the bamboo and glass, I made a simple telescope.\n\nThen I followed the same sequence again.\n\nThe little princess walked toward the school in the mountains.\n\nI waited.\n\nAnd, just like before...\n\nshe was shot.\n\nBut this time, I was ready.\n\nI raised the bamboo telescope and pointed it toward the mountains across from us.\n\nThere, from far away, I saw a flash of reflected light.\n\nA small glint.\n\nLike light reflecting off a sniper scope.\n\nAt last, I found the direction of the attacker.\n\nSomeone was on the mountain hill across from us.\n\nWithout thinking, I tried to chase them.\n\nWith the body of a child, I ran as hard as I could.\n\nAlong the way, I found a rope path connecting one hill to another.\n\nIt looked like a simple **zipline**—a rope already stretched across the gap, as if it was meant to carry someone from one side of the ravine to the other.\n\nI took a piece of wood, hooked it onto the rope, and tried to hang from it to cross.\n\nBut my body was too small.\n\nI did not have enough strength.\n\nMy hands began to weaken.\n\nMy grip slipped.\n\nAnd I fell.\n\nUnfortunately, the dream ended there.\n\nI never found out whether I managed to save the princess.\n\nI never found out who the shooter on the opposite hill really was.\n\nThe only thing I remembered was this:\n\nI had returned to the beginning over and over again...\n\ntrying to save a little princess who always died before reaching her school."
  },

    "content_id": "# Chapter 4 — Dunia yang Tak Pernah Mengenal Siang\n\n> *“Aku tidak tahu bagaimana bisa berada di sana. Yang kuingat hanyalah saat membuka mata, dunia itu sudah menungguku.”*\n\nAku terbangun di sebuah dunia yang sama sekali tidak kukenal.\n\nAku sendirian.\n\nHal pertama yang kusadari adalah langitnya. Dunia itu seolah tidak pernah mengenal siang. Langit selalu diselimuti malam, namun bukan malam yang benar-benar gelap.\n\nCahaya bulan menerangi seluruh daratan dengan sinar kebiruan yang lembut.\n\nAku mulai berjalan tanpa mengetahui ke mana tujuan sebenarnya.\n\nDi hadapanku terbentang sebuah lembah yang sangat panjang.\n\nDi sisi kiri dan kanannya berdiri bangunan-bangunan tinggi yang menyerupai apartemen atau hotel. Namun semuanya telah rusak. Dindingnya retak, jendelanya pecah, sebagian bangunan bahkan runtuh hingga hanya menyisakan kerangka.\n\nAngin bertiup sangat kencang.\n\nSuara angin yang melewati bangunan-bangunan kosong itu terdengar seperti bisikan yang tak pernah berhenti. Sesekali terdengar suara-suara aneh dari kejauhan.\n\nTempat itu terasa hidup...\n\nNamun bukan kehidupan yang seharusnya ada.\n\nEntah mengapa, tubuhku di dunia itu memiliki kemampuan yang tidak kumiliki di dunia nyata.\n\nAku mampu berlari dengan kecepatan yang luar biasa. Bahkan untuk mencapai tempat tinggi, aku tidak membutuhkan tangga. Aku berlari di antara kedua sisi lembah, menjadikan dinding kanan dan kiri sebagai pijakan.\n\nAwalnya aku berniat memasuki salah satu bangunan itu, tetapi setiap kali mendekat, muncul perasaan aneh yang membuatku mengurungkan niat.\n\nSeolah ada sesuatu di dalam sana yang tidak ingin kutemui.\n\n***\n\nSetelah berjalan cukup lama, aku tiba di sebuah desa.\n\nNamun desa itu sangat berbeda dari desa mana pun yang pernah kulihat.\n\nTidak ada rumah-rumah seperti biasanya.\n\nDi tengah desa terdapat sebuah jalan utama yang sangat lebar. Di sisi kiri dan kanannya berjajar bangunan terbuka yang lebih menyerupai lapak-lapak pasar daripada rumah.\n\nDi situlah seluruh penduduk tinggal.\n\nMereka makan di sana. Mereka berbincang di sana. Mereka beristirahat di sana. Bahkan mereka tidur di sana.\n\nPenduduk desa menyambutku dengan ramah.\n\nMereka berbicara kepadaku sambil tersenyum, tetapi aku sama sekali tidak memahami bahasa mereka.\n\nBukan bahasa Indonesia. Bukan bahasa Inggris. Bahkan tidak menyerupai bahasa apa pun yang pernah kudengar.\n\nSalah seorang dari mereka memberikan sebuah tempurung berisi minuman bening.\n\nRasanya mengingatkanku pada air kelapa muda.\n\nTiba-tiba...\n\nSuara sebuah terompet menggema dari kejauhan.\n\nBegitu besar hingga seluruh desa langsung terdiam.\n\nMereka saling berbicara dengan cepat menggunakan bahasa yang tetap tidak kupahami.\n\nNamun anehnya, tanpa seorang pun menjelaskan kepadaku, aku langsung tahu apa yang harus kulakukan.\n\n**Jika aku tidak ikut bersujud, sesuatu yang buruk akan terjadi.**\n\nTanpa ragu aku ikut bersujud bersama seluruh penduduk desa.\n\nTak lama kemudian terdengar suara langkah yang sangat berat.\n\nAku memberanikan diri mengangkat pandangan sedikit.\n\nSebuah rombongan sedang melintas.\n\nMereka bukan manusia biasa. Tubuh mereka sangat besar. Sebagian menunggangi gajah, namun ukuran tubuh mereka sendiri hampir sama besarnya dengan gajah yang mereka tunggangi.\n\nSeluruh desa tetap bersujud sampai rombongan itu benar-benar menghilang.\n\n***\n\nBeberapa waktu kemudian, aku kembali bermimpi.\n\nAku langsung tahu.\n\nAku kembali ke dunia yang sama.\n\nKali ini rasa penasaranku mengalahkan rasa takut.\n\nAku memanjat salah satu bangunan yang menyerupai hotel tua.\n\nBagian dalamnya masih cukup utuh. Masih terdapat tempat tidur, kamar mandi, dan beberapa perabot sederhana yang tertinggal.\n\nLalu tiba-tiba terdengar jeritan.\n\nJeritan itu berasal dari dalam kamar mandi.\n\nSuaranya sangat keras. Penuh rasa sakit.\n\nAku memberanikan diri mendekati pintunya.\n\nDengan perlahan kubuka pintu kamar mandi itu.\n\nKosong.\n\nTidak ada siapa pun.\n\nNamun tepat saat aku berdiri di depan pintu, seluruh tubuhku merinding.\n\nAku merasakan sesuatu sedang memperhatikanku.\n\nTanpa berpikir panjang, aku langsung berlari keluar dari bangunan itu.\n\nDan sepanjang pelarianku, aku tidak pernah sekali pun berani menoleh ke belakang.",
    "content_en": "# Chapter 4 — The World That Never Knew Daylight\n\n> *“I don't know how I ended up there. All I remember is opening my eyes and finding that world already waiting for me.”*\n\nI woke up in a world I did not recognize at all.\n\nI was alone.\n\nThe first thing I noticed was the sky. That world seemed to have never known daylight. The sky was always wrapped in night, but not a darkness that made everything invisible.\n\nMoonlight bathed the land in a soft bluish glow.\n\nI began walking without knowing where I was supposed to go.\n\nBefore me stretched a long valley.\n\nOn both sides stood tall buildings resembling apartments or hotels. But they were all ruined. Their walls were cracked, their windows shattered, and some had collapsed until only their frames remained.\n\nThe wind blew fiercely.\n\nAs it passed through the empty buildings, it sounded like endless whispers. Every now and then, strange noises came from far away.\n\nThe place felt alive...\n\nbut not with the kind of life that should exist.\n\nFor some reason, my body in that world had abilities I did not have in real life.\n\nI could run with incredible speed. Even when I needed to reach higher ground, I did not need stairs. I ran between the two sides of the valley, using the walls on the left and right as footholds.\n\nAt first, I wanted to enter one of the buildings, but every time I got close, a strange feeling made me stop.\n\nAs if there was something inside that I was never meant to meet.\n\n***\n\nAfter walking for quite a while, I arrived at a village.\n\nBut it was different from any village I had ever seen.\n\nThere were no houses like the ones I knew.\n\nA wide main road ran through the center. On both sides stood open structures that looked more like market stalls than homes.\n\nThat was where the villagers lived.\n\nThey ate there. They talked there. They rested there. They even slept there.\n\nThe villagers welcomed me kindly.\n\nThey spoke to me with smiles on their faces, but I could not understand their language at all.\n\nIt was not Indonesian. It was not English. It did not resemble any language I had ever heard.\n\nOne of them handed me a coconut-shell cup filled with clear liquid.\n\nIt tasted like young coconut water.\n\nThen, suddenly...\n\nthe sound of a trumpet echoed from afar.\n\nIt was so loud that the entire village fell silent at once.\n\nThe villagers began speaking quickly in a language I still could not understand.\n\nYet strangely, without anyone explaining it to me, I knew exactly what I had to do.\n\n**If I did not bow down with them, something terrible would happen.**\n\nWithout hesitation, I bowed down together with the villagers.\n\nA moment later, I heard extremely heavy footsteps.\n\nI dared to raise my gaze slightly.\n\nA procession was passing by.\n\nThey were not ordinary humans. Their bodies were enormous. Some rode elephants, yet the riders themselves were almost as large as the elephants they sat on.\n\nThe entire village remained bowed until the procession completely disappeared.\n\n***\n\nSome time later, I dreamed of that place again.\n\nI knew immediately.\n\nI had returned to the same world.\n\nThis time, curiosity overcame fear.\n\nI climbed into one of the buildings that resembled an old hotel.\n\nThe inside was still mostly intact. There was a bed, a bathroom, and a few simple pieces of furniture left behind.\n\nThen, suddenly, I heard a scream.\n\nIt came from inside the bathroom.\n\nIt was loud. Filled with pain.\n\nI forced myself to approach the door.\n\nSlowly, I opened it.\n\nEmpty.\n\nThere was no one there.\n\nBut the moment I stood in front of the doorway, my whole body shivered.\n\nI felt something watching me.\n\nWithout thinking, I ran out of the building.\n\nAnd throughout my escape, I never dared to look back."
  },

    "title_id": "Rumah Penyihir",
    "title_en": "The Witch House",
    "content_id": "# Chapter 5 — Rumah Penyihir\n\n> *“Bukan pertahanannya yang paling kuingat, melainkan rumah itu... dan keluarga yang terasa seperti benar-benar milikku.”*\n\nMimpi ini tidak sepanjang mimpi-mimpi yang lain, tetapi dunia yang ada di dalamnya terasa begitu hidup.\n\nDi dunia itu, aku memiliki keluarga yang benar-benar berbeda.\n\nAku adalah anak bungsu sekaligus satu-satunya laki-laki dari empat bersaudara. Ketiga kakakku semuanya perempuan. Aku juga memiliki seorang ibu yang terasa begitu nyata.\n\nAnehnya, saat berada di sana, aku tidak pernah merasa mereka orang asing.\n\nRasanya seperti aku memang telah lahir dan tumbuh bersama mereka sejak kecil.\n\nRumah kami pun jauh dari rumah biasa.\n\nBangunannya menyerupai rumah para penyihir dalam dunia fantasi. Seluruh dindingnya berwarna hitam pekat, bukan seperti dicat, melainkan berasal dari kayu aneh yang sangat gelap.\n\nDi ruang tengah terdapat sebuah area terbuka dengan beberapa tangga yang mengarah ke lantai atas. Setiap anak memiliki kamar sendiri, dan masing-masing kamar memiliki tangganya sendiri yang langsung menuju ruang tengah.\n\nSetiap kali ibu memanggil kami, kami akan keluar dari kamar masing-masing, menuruni tangga kami sendiri, lalu berkumpul di tengah rumah.\n\n***\n\nNamun kehidupan di sana tidak pernah benar-benar tenang.\n\nDunia itu dipenuhi ancaman.\n\nGerombolan goblin dan berbagai makhluk lain terus berdatangan menyerang.\n\nTugasku adalah membangun benteng pertahanan.\n\nAku harus mendirikan tembok, menara, dan berbagai bangunan pertahanan secepat mungkin sambil menghadapi serangan yang datang tanpa henti.\n\nAku juga memiliki berbagai mantra yang dapat digunakan untuk memperkuat pertahanan.\n\nAnehnya, meskipun mimpi ini tidak memiliki pertarungan besar atau akhir yang dramatis, yang paling membekas justru bukan peperangannya.\n\nYang paling kuingat adalah rumah itu.\n\nRumah kayu hitam yang berdiri megah dengan nuansa fantasi.\n\nRuang tengah tempat kami selalu berkumpul.\n\nTangga-tangga yang menghubungkan kamar setiap anak.\n\nDan perasaan hangat bahwa aku benar-benar memiliki seorang ibu dan tiga kakak perempuan yang menjadi keluargaku.",
    "content_en": "# Chapter 5 — The Witch House\n\n> *“What I remember most is not the defense, but the house... and the family that felt truly mine.”*\n\nThis dream was not as long as the others, but the world within it felt incredibly alive.\n\nIn that world, I had a completely different family.\n\nI was the youngest child and the only boy among four siblings. My three older siblings were all girls. I also had a mother who felt very real.\n\nStrangely, while I was there, I never felt like they were strangers.\n\nIt felt as if I had truly been born and raised with them since childhood.\n\nOur house was far from ordinary.\n\nIt resembled a witch's house from a fantasy world. Its walls were pitch black—not painted black, but made from a strange, very dark wood.\n\nIn the central room, there was an open space with several staircases leading upward. Each child had their own room, and each room had its own staircase leading directly down to the center.\n\nWhenever Mother called us, we would come out of our rooms, descend our own staircases, and gather in the middle of the house.\n\n***\n\nBut life there was never truly peaceful.\n\nThe world was filled with threats.\n\nGroups of goblins and other creatures kept coming to attack.\n\nMy task was to build a defensive base.\n\nI had to raise walls, towers, and various defensive structures as quickly as possible while the attacks continued without pause.\n\nI also had several spells that could strengthen our defenses.\n\nStrangely, even though this dream had no grand battle or dramatic ending, the thing that stayed with me most was not the war.\n\nIt was the house.\n\nThe magnificent black wooden house with its fantasy-like atmosphere.\n\nThe central room where we always gathered.\n\nThe staircases connecting each child's room.\n\nAnd the warm feeling that I truly had a mother and three older sisters who were my family."
  },
  {
    "id": "chapter-6-rumah-kecil-laut",

    "title_id": "Rumah Kecil di Tengah Laut",
    "title_en": "The Little House in the Sea",
    "content_id": "# Chapter 6 — Rumah Kecil di Tengah Laut\n\n> *“Tidak ada monster. Tidak ada bahaya. Hanya aku, rumah kayu kecil, dan laut sebening kristal.”*\n\nMimpi ini terasa sangat tenang.\n\nTidak ada pertarungan. Tidak ada ancaman. Tidak ada sesuatu yang harus kukejar.\n\nDi mimpi itu, aku masih sangat kecil, mungkin baru berusia sekitar lima tahun.\n\nAku tinggal bersama ayah dan ibuku di sebuah rumah kayu yang sangat sederhana.\n\nRumahnya kecil, bahkan sangat kecil. Hampir tidak memiliki banyak perabotan.\n\nRumah itu berdiri di tengah hamparan laut.\n\nSebenarnya bukan benar-benar berada jauh di tengah lautan. Di sekelilingnya masih terdapat batu-batu besar yang bisa kulewati dengan berjalan kaki.\n\nNamun dari sudut pandang seorang anak kecil, rasanya seperti rumah itu berdiri sendirian di tengah dunia yang dipenuhi air.\n\nHal yang paling membekas bukanlah rumahnya.\n\nMelainkan lautnya.\n\nAirnya begitu jernih hingga aku bisa melihat jauh ke dasar. Cahaya matahari menembus permukaan air, membuat seluruh lautan berkilau seperti kaca.\n\nEntah bagaimana, suatu saat ayah dan ibuku menghilang.\n\nAku tidak ingat ke mana mereka pergi.\n\nAku hanya menyadari bahwa kini aku sendirian.\n\nAnehnya, aku tidak merasa takut.\n\nAku justru menghabiskan waktuku menikmati lautan di sekitarku.\n\nAku melompat dari bebatuan ke dalam air yang sebening kristal, berenang tanpa rasa khawatir. Yang lebih aneh lagi, aku bisa bernapas di dalam air seolah itu adalah hal yang paling wajar.\n\nMimpi ini memang sangat singkat.\n\nNamun hingga sekarang, yang masih tersisa dalam ingatanku bukanlah jalan ceritanya, melainkan perasaannya.\n\nPerasaan damai.\n\nPerasaan bebas.\n\nDan pemandangan sebuah rumah kayu kecil yang berdiri di antara laut sebening kristal.",
    "content_en": "# Chapter 6 — The Little House in the Sea\n\n> *“There were no monsters. No danger. Only me, a small wooden house, and a sea as clear as crystal.”*\n\nThis dream felt deeply peaceful.\n\nThere were no battles. No threats. Nothing I had to chase.\n\nIn the dream, I was very young—probably around five years old.\n\nI lived with my father and mother in a very simple wooden house.\n\nThe house was small. Very small, even. It barely had any furniture.\n\nIt stood in the middle of a wide stretch of sea.\n\nNot truly far out in the ocean, though. Around it were large stones I could still walk across.\n\nBut from the perspective of a small child, it felt as if the house stood alone in a world filled with water.\n\nWhat stayed with me most was not the house.\n\nIt was the sea.\n\nThe water was so clear that I could see far down to the bottom. Sunlight passed through the surface, making the entire sea glitter like glass.\n\nSomehow, at one point, my father and mother disappeared.\n\nI do not remember where they went.\n\nI only realized that I was alone.\n\nStrangely, I did not feel afraid.\n\nInstead, I spent my time enjoying the sea around me.\n\nI jumped from the rocks into the crystal-clear water and swam without worry. Even stranger, I could breathe underwater as if it were the most natural thing in the world.\n\nThe dream was very short.\n\nBut even now, what remains in my memory is not the plot, but the feeling.\n\nA feeling of peace.\n\nA feeling of freedom.\n\nAnd the image of a small wooden house standing among waters as clear as crystal."
  },

    "title_id": "Tiga Pesan Ayah",
    "title_en": "Father's Three Instructions",
    "content_id": "# Chapter 7 — Tiga Pesan Ayah\n\n> *“Kata ‘amin’ yang dulu menjadi doa keselamatan, pada akhirnya berubah menjadi doa perpisahan.”*\n\nAku tidak berada di dalam cerita ini.\n\nAku hanya menjadi seorang pengamat, seolah-olah melihat seluruh kejadian dari sudut pandang orang ketiga.\n\nNamun ada satu hal yang selalu membuatku takut setiap kali mengalami mimpi seperti ini.\n\nMeski hanya menyaksikan, setiap rasa sakit yang dialami tokoh-tokoh di dalamnya selalu ikut kurasakan seolah terjadi pada tubuhku sendiri.\n\nHubungan gadis itu dengan keluarga tantenya tidak pernah benar-benar akur.\n\nAda hari-hari ketika sang tante memarahinya karena hal-hal kecil. Ada juga hari-hari lain ketika tante itu bersikap manis, seolah kemarahan sebelumnya tidak pernah terjadi.\n\nNamun gadis itu tetap tinggal di rumah tersebut.\n\nAyahnya yang memutuskan.\n\nKarena ayahnyalah yang mempercayakan keselamatannya pada keluarga itu.\n\nMenjelang liburan sekolah bersama teman-temannya, sang ayah memanggilnya dan memberi tiga pesan yang terdengar aneh.\n\n**Pertama.** Selalu bawa pisau atau kapak kecil.\n\n**Kedua.** Pakai sandal yang berbunyi setiap kali melompat.\n\n**Ketiga.** Selalu berdoa, ucapkan *“amin”*, lalu buang satu bunga mawar.\n\n***\n\nMalam sebelum liburan dimulai, gadis itu mencoba pesan-pesan tersebut sendiri.\n\nIa berdiri sendirian memegang kapak kecil.\n\nTiba-tiba angin bertiup kencang.\n\nKetika ia melompat pelan agar sandalnya berbunyi, sosok ayahnya muncul begitu saja dari arah gelap.\n\nDan saat ia menutup mata, mengucap doa, lalu melepaskan satu bunga mawar ke tanah, petir menyambar.\n\nHujan turun begitu deras.\n\nIa berlari masuk dan memilih tidur.\n\nTapi paginya tidak seperti biasa.\n\n***\n\nKetika ia keluar kamar, ia menemukan sepupu laki-lakinya tergeletak di lantai atas.\n\nTak bergerak.\n\nIa berlari ke kamar mandi di lantai dua dan mengunci pintu.\n\nDari balik pintu, ia mendengar langkah tantenya menaiki tangga.\n\nLalu jeritan.\n\nLalu suara yang berubah menjadi tuduhan.\n\n*“Di mana kau?! Apa yang kau lakukan?!”*\n\nGadis itu berkata bahwa ia baru bangun dan bukan pelakunya.\n\nNamun suara tinjuan di pintu berhenti mendadak.\n\nYang terdengar setelahnya adalah suara seretan, benturan, lalu diam.\n\nSeseorang menyeret tubuh tantenya dan meninggalkannya di depan pintu kamar mandi.\n\nDi tengah kepanikan, ia teringat pesan kedua ayahnya.\n\n**Lompat, agar sandalnya berbunyi.**\n\nIa mulai melompat pelan-pelan.\n\nLalu ayahnya muncul dari jendela kamar mandi, memanjat masuk, dan menarik putrinya untuk bersembunyi di belakangnya.\n\nBeberapa menit terasa seperti berjam-jam.\n\nLangkah kaki itu kembali ke depan pintu.\n\nAyahnya memberi isyarat kecil pada putrinya.\n\nBuka pintunya.\n\nPerlahan.\n\nBegitu pintu kamar mandi terbuka, bukan sosok asing yang muncul.\n\nMelainkan kakaknya sendiri.\n\nLelaki yang sejak kecil tinggal bersamanya di rumah itu, sama-sama dititipkan oleh ayah mereka kepada sang tante.\n\nKakaknya berdiri di ambang pintu dengan wajah tenang, begitu kontras dengan kekacauan di lantai dua itu.\n\nAyah mereka yang bersembunyi di dalam kamar mandi terkejut melihat putranya justru diam, seolah bukan ancaman.\n\nNamun yang membuat sang ayah membeku bukan hanya kehadiran putranya.\n\nMelainkan tatapan sang gadis kepada kakaknya.\n\nTatapan yang terlalu lembut.\n\nTerlalu dekat.\n\nTerlalu penuh rahasia untuk sekadar hubungan saudara kandung.\n\nDalam sekejap, sang gadis berbalik dan menusukkan pisau tepat ke leher ayahnya.\n\nLelaki itu jatuh tersungkur, meraih-raih sink untuk bangkit, tetapi darahnya mengalir terlalu cepat.\n\nKakaknya melangkah masuk sepenuhnya.\n\nIa meraih lengan adiknya dengan sentuhan ringan.\n\nSang gadis menoleh kecil, dan keduanya saling memahami tanpa sepatah kata pun.\n\nSeolah semuanya sudah diputuskan jauh sebelum malam itu.\n\nTanpa keraguan.\n\nTanpa panik.\n\nMereka mengangkat tubuh sang ayah.\n\nGerakan mereka sinkron, rapi, dan tenang, seperti sesuatu yang pernah mereka latih dalam diam.\n\nKetika tubuh itu mereka seret mendekati jendela, sang gadis menunduk ke telinga ayahnya dan berbisik pelan,\n\n*“Amin.”*\n\nDalam hitungan detik, mereka mendorongnya keluar jendela lantai dua.\n\nLalu keheningan menelan kamar mandi tersebut.\n\nKakaknya menatap sang gadis dengan senyum tipis.\n\nIa membalasnya dengan ketenangan yang sama.\n\nMereka bukan sekadar kakak dan adik yang dititipkan sejak kecil.\n\nMereka adalah dua orang yang telah terikat dalam rahasia gelap.\n\nDua orang yang telah berjanji...\n\nuntuk membuang mawar bersama-sama.",
    "content_en": "# Chapter 7 — Father's Three Instructions\n\n> *“The word ‘amen,’ once taught as a prayer for safety, became a final prayer of farewell.”*\n\nI was not part of this story.\n\nI was only an observer, watching everything unfold from a third-person point of view.\n\nYet there was one thing that always frightened me whenever I had dreams like this.\n\nEven though I was only watching, every wound and every pain the characters suffered was something I could feel as if it were happening to my own body.\n\nThe girl's relationship with her aunt's family was never truly peaceful.\n\nThere were days when her aunt scolded her over small things. There were also days when the same aunt acted kindly, as if the anger from before had never happened.\n\nStill, the girl stayed in that house.\n\nIt was her father's decision.\n\nHe had entrusted her safety to that family.\n\nBefore her school holiday trip with friends, her father called her and gave her three strange instructions.\n\n**First.** Always carry a knife or a small hatchet.\n\n**Second.** Wear sandals that make a sound whenever you jump.\n\n**Third.** Always pray, say *“amen,”* and throw away one rose.\n\n***\n\nOn the night before the trip began, the girl tried following those instructions herself.\n\nShe stood alone, holding a small hatchet.\n\nSuddenly, the wind began to blow hard.\n\nWhen she jumped softly to make her sandals sound, her father's figure appeared out of the darkness.\n\nAnd when she closed her eyes, prayed, and let one rose fall to the ground, lightning struck.\n\nRain poured heavily.\n\nShe ran inside and chose to sleep.\n\nBut the next morning was not normal.\n\n***\n\nWhen she stepped out of her room, she found her male cousin lying on the upstairs floor.\n\nMotionless.\n\nShe ran into the second-floor bathroom and locked the door.\n\nFrom behind it, she heard her aunt climbing the stairs.\n\nThen a scream.\n\nThen a voice turning into accusation.\n\n*“Where are you?! What did you do?!”*\n\nThe girl said she had only just woken up and that she was not the culprit.\n\nBut the pounding on the door suddenly stopped.\n\nWhat followed was the sound of dragging, a heavy thud, and then silence.\n\nSomeone dragged her aunt's body and left it in front of the bathroom door.\n\nIn the middle of panic, she remembered her father's second instruction.\n\n**Jump, so the sandals make a sound.**\n\nShe began jumping softly.\n\nThen her father appeared through the bathroom window, climbed inside, and pulled his daughter behind him.\n\nA few minutes felt like hours.\n\nThe footsteps returned to the door.\n\nHer father gave his daughter a small signal.\n\nOpen the door.\n\nSlowly.\n\nAs the bathroom door opened, it was not a stranger who appeared.\n\nIt was her own older brother.\n\nThe boy who had lived with her in that house since childhood, entrusted by their father to their aunt just as she had been.\n\nHer brother stood in the doorway with a calm expression, so different from the chaos on the second floor.\n\nTheir father, hiding inside the bathroom, froze in shock when he saw his son standing there in silence, as if he were not a threat.\n\nBut what truly made the father go still was not only the son's presence.\n\nIt was the way the girl looked at her brother.\n\nA gaze too gentle.\n\nToo close.\n\nToo full of secrets to be merely sibling affection.\n\nIn an instant, the girl turned and drove the knife straight into her father's throat.\n\nThe man collapsed, reaching desperately for the sink to pull himself up, but the blood was flowing too quickly.\n\nHer brother stepped fully into the bathroom.\n\nHe took his sister's arm with a light touch.\n\nThe girl turned slightly toward him, and the two of them understood each other without a single word.\n\nAs if everything had been decided long before that night.\n\nNo hesitation.\n\nNo panic.\n\nTogether, they lifted their father's body.\n\nTheir movements were synchronized, careful, and calm, like something they had once rehearsed in silence.\n\nAs they dragged the body toward the window, the girl lowered her head to her father's ear and whispered softly,\n\n*“Amen.”*\n\nIn a matter of seconds, they pushed him out of the second-floor window.\n\nThen silence swallowed the bathroom.\n\nHer brother looked at the girl with a faint smile.\n\nShe answered with the same calmness.\n\nThey were not merely a brother and sister who had been entrusted to the same house since childhood.\n\nThey were two people bound by a dark secret.\n\nTwo people who had made a promise...\n\nto throw away the rose together."
  },

    "id": "chapter-8-sang-paus",
    "chapter": 8,
    "title_id": "Sang Paus dari Laut Tanpa Akhir",
    "title_en": "The Whale from the Endless Sea",
    "content_id": "# Chapter 8 — Sang Paus dari Laut Tanpa Akhir\n\n> *“Setiap makhluk mitologis memiliki domainnya sendiri. Dan ketika sang paus kembali ke air, seluruh lautan menjadi wilayahnya.”*\n\nDunia yang kami tinggali bukanlah dunia biasa.\n\nDi balik kehidupan manusia, terdapat makhluk-makhluk mitologis yang keberadaannya dirahasiakan. Setiap kali salah satu dari mereka muncul, bencana besar selalu mengikutinya.\n\nSejauh ini, kami baru mengetahui dua makhluk.\n\nYang pertama adalah seekor naga.\n\nAnehnya, naga itu bukan musuh kami. Justru sebaliknya, kami menjalin kerja sama dengannya.\n\nDomain miliknya berada di pegunungan yang megah, dipenuhi langit cerah, hutan lebat, dan lembah yang begitu indah hingga terasa seperti dunia lain.\n\nSuatu hari, kami menerima laporan dari seorang ayah.\n\nIa mengatakan bahwa putranya berubah menjadi aneh sejak memelihara seekor paus kecil.\n\nBukan mainan. Bukan ilusi.\n\nMelainkan paus sungguhan berukuran kecil yang entah bagaimana bisa hidup di daratan.\n\nBegitu melihatnya, kami langsung sadar.\n\nItu bukan paus biasa.\n\nIa adalah salah satu makhluk mitologis yang selama ini kami cari.\n\nUsianya memang masih sangat muda, belum mencapai bentuk dewasanya. Namun kecerdasannya jauh melampaui dugaan kami.\n\nKami memutuskan untuk membunuhnya sebelum ia tumbuh semakin kuat.\n\n***\n\nPertarungan pun pecah.\n\nMeski masih muda, kekuatannya sudah luar biasa. Setelah pertarungan panjang, kami akhirnya berhasil melumpuhkannya.\n\nTetapi di saat-saat terakhir, makhluk itu menghilang.\n\nPencarian membawa kami kepada sekelompok anak kecil. Tanpa mereka sadari, mereka telah menyembunyikan paus itu demi melindunginya.\n\nBarulah kami mengetahui satu fakta penting.\n\nSumber kekuatan paus itu adalah air.\n\nSemakin banyak air yang ia minum, semakin besar pula kekuatannya.\n\nKarena masih muda dan belum sempat mendapatkan cukup air, kami akhirnya berhasil menangkapnya.\n\nSeperti naga, paus itu juga memiliki domainnya sendiri.\n\nDomain paus adalah hamparan lautan biru tanpa batas. Airnya begitu jernih hingga dasar laut terlihat jelas, tetapi di balik keindahan itu tersimpan tekanan mengerikan.\n\nKami memutuskan mengurungnya di dalam domain tersebut sambil mencari cara terbaik untuk menghabisinya.\n\nKami menyimpulkan satu hal.\n\nKami tidak boleh membunuhnya di laut.\n\nKami harus memaksanya bertarung di perairan kecil, sebuah waduk.\n\nHari eksekusi pun tiba.\n\nHanya ada tiga orang di sana.\n\nAku.\n\nSang naga dalam wujud manusia.\n\nDan satu rekanku.\n\nSemuanya berjalan sesuai rencana sampai kami menyadari satu kesalahan fatal.\n\nSaat bersembunyi bersama anak-anak sebelumnya, paus itu ternyata diam-diam menyimpan sedikit air di dalam mulutnya.\n\nJumlahnya memang tidak banyak.\n\nNamun bagi makhluk sepertinya, itu sudah lebih dari cukup.\n\nDalam sekejap, semburan air bertekanan tinggi menghantam kami bertiga. Tubuh kami terpental, dan sebelum sempat berdiri, paus itu sudah melompat ke dalam waduk.\n\nKami segera mengejarnya.\n\nNamun ia lenyap begitu saja.\n\n***\n\nPencarian besar-besaran segera dilakukan.\n\nYang kami temukan justru sesuatu yang jauh lebih mengerikan.\n\nSeluruh ikan di waduk itu mulai mengalami evolusi yang tidak wajar.\n\nDi tengah pencarian, kami menemukan seekor **Dugong King**.\n\nMakhluk itu merupakan penguasa perairan tersebut, tetapi kondisinya mengenaskan. Tubuhnya terbelah menjadi dua.\n\nDengan suara yang hampir menghilang, ia menceritakan bahwa di dasar waduk terdapat arus bawah air yang sangat kuat. Arus itu terhubung dengan jalur-jalur laut yang tidak pernah diketahui manusia.\n\nPaus itu memanfaatkan arus tersebut untuk melarikan diri.\n\nSebelum pergi, ia juga membantai hampir seluruh kehidupan di perairan itu.\n\nDengan sisa tenaganya, Dugong King memperingatkan kami.\n\n*“Paus itu... sudah tidak berada di sini lagi.”*\n\n*“Kemungkinan besar... ia telah mencapai perairan lain.”*\n\nKami lalu mencari seseorang yang dikenal sebagai pelacak terbaik untuk seluruh wilayah lautan.\n\nProses pelacakannya terasa seperti melihat peta dunia yang terus diperbesar.\n\nIa mulai dari waduk.\n\nLalu sungai-sungai besar.\n\nDanau nasional.\n\nLaut lepas.\n\nSamudra.\n\nHingga akhirnya mencapai tingkatan yang bahkan belum pernah kami dengar sebelumnya.\n\n**Perairan Benua.**\n\nTempat seluruh lautan di dunia saling terhubung menjadi satu kesatuan.\n\nDi titik itulah gambaran sang paus akhirnya terlihat.\n\nIa sudah bukan lagi paus kecil yang pernah kami buru.\n\nTubuhnya telah tumbuh menjadi sangat besar, jauh melampaui ukuran makhluk laut mana pun yang pernah kubayangkan.\n\nBentuknya masih menyerupai paus, tetapi seluruh tubuhnya tampak seperti tersusun dari air biru sepenuhnya.\n\nBening.\n\nTembus pandang.\n\nSeolah lautan itu sendiri telah membentuk tubuh raksasa dan memberinya kesadaran.\n\nCahaya bergerak di dalam tubuhnya seperti arus laut yang hidup, dan setiap lekukan tubuhnya bergetar seperti gelombang yang siap menelan dunia.\n\nWajah sang pelacak berubah pucat.\n\n*“Kita terlambat.”*\n\nKami semua terdiam.\n\n*“Paus itu tidak hanya berhasil melarikan diri.”*\n\n*“Ia telah menguasai seluruh perairan.”*\n\nBukan hanya lautan di dunia.\n\nBukan hanya samudra.\n\nMelainkan seluruh lautan yang ada di semesta.\n\nSetiap tetes air kini menjadi wilayah kekuasaannya.\n\nDan saat ia memutuskan untuk bergerak...\n\nTidak akan ada lagi tempat di dunia yang aman.\n\nPerang yang selama ini kami coba cegah akhirnya akan dimulai.",
    "content_en": "# Chapter 8 — The Whale from the Endless Sea\n\n> *“Every mythical creature has its own domain. And when the whale returned to the water, the entire sea became its territory.”*\n\nThe world we lived in was no ordinary world.\n\nBehind human life, there existed mythical creatures whose presence was kept secret. Whenever one of them appeared, disaster always followed.\n\nSo far, we knew of only two.\n\nThe first was a dragon.\n\nStrangely, the dragon was not our enemy. On the contrary, we worked together with it.\n\nIts domain lay among majestic mountains, bright skies, dense forests, and valleys so beautiful they felt like another world.\n\nOne day, we received a report from a father.\n\nHe said his son had started acting strangely after keeping a small whale.\n\nNot a toy. Not an illusion.\n\nA real whale, small in size, somehow able to live on land.\n\nThe moment we saw it, we knew.\n\nIt was no ordinary whale.\n\nIt was one of the mythical creatures we had been searching for.\n\nIt was still very young and had not yet reached its adult form. But its intelligence far surpassed what we expected.\n\nWe decided to kill it before it could grow stronger.\n\n***\n\nThe fight broke out.\n\nEven though it was young, its power was extraordinary. After a long battle, we finally managed to weaken it.\n\nBut at the last moment, the creature disappeared.\n\nOur search led us to a group of children. Without realizing what it truly was, they had hidden the whale in order to protect it.\n\nThat was when we learned one important fact.\n\nThe source of the whale's power was water.\n\nThe more water it drank, the stronger it became.\n\nBecause it was still young and had not consumed enough water, we eventually managed to capture it.\n\nLike the dragon, the whale also had its own domain.\n\nThe whale's domain was an endless blue sea. The water was so clear that the seabed was visible, yet beneath its beauty lay a terrifying pressure.\n\nWe decided to imprison it within its own domain while searching for the best way to kill it.\n\nWe reached one conclusion.\n\nWe could not kill it in the sea.\n\nWe had to force it to fight in a small body of water—a reservoir.\n\nThe day of execution arrived.\n\nOnly three of us were there.\n\nMe.\n\nThe dragon in human form.\n\nAnd one of my companions.\n\nEverything went according to plan until we realized one fatal mistake.\n\nWhile it had been hidden by the children earlier, the whale had secretly kept a small amount of water inside its mouth.\n\nIt was not much.\n\nBut for a creature like that, it was more than enough.\n\nIn an instant, a high-pressure blast of water struck the three of us. We were thrown back, and before we could stand, the whale had already leapt into the reservoir.\n\nWe chased after it.\n\nBut it vanished without a trace.\n\n***\n\nA massive search began.\n\nWhat we found instead was something far more terrifying.\n\nThe fish in the reservoir had begun evolving into unnatural forms.\n\nDuring the search, we found a **Dugong King**.\n\nIt was the ruler of those waters, but its condition was horrific. Its body had been split in two.\n\nWith a voice that was nearly gone, it told us that a powerful underwater current existed at the bottom of the reservoir. That current connected to sea routes unknown to humans.\n\nThe whale had used it to escape.\n\nBefore leaving, it had also slaughtered nearly all life in those waters.\n\nWith the last of its strength, the Dugong King warned us.\n\n*“The whale... is no longer here.”*\n\n*“Most likely... it has reached another body of water.”*\n\nWe then searched for someone known as the best tracker of all oceanic regions.\n\nThe tracking process felt like watching a world map being magnified again and again.\n\nIt began from the reservoir.\n\nThen the great rivers.\n\nThe national lakes.\n\nThe open sea.\n\nThe ocean.\n\nUntil it finally reached a level we had never heard of before.\n\n**The Continental Waters.**\n\nA place where all the seas of the world were connected into one.\n\nIt was there that the image of the whale finally appeared.\n\nIt was no longer the small whale we had once hunted.\n\nIts body had grown enormous, far beyond the size of any sea creature I could imagine.\n\nIt still resembled a whale, but its entire body looked as if it were made completely of blue water.\n\nClear.\n\nTransparent.\n\nAs though the sea itself had taken the shape of a giant body and gained a will of its own.\n\nLight moved within it like living ocean currents, and every curve of its body trembled like a wave ready to swallow the world.\n\nThe tracker's face turned pale.\n\n*“We're too late.”*\n\nWe all fell silent.\n\n*“The whale didn't just escape.”*\n\n*“It has taken control of all waters.”*\n\nNot just the seas of the world.\n\nNot just the oceans.\n\nBut every sea in the universe.\n\nEvery drop of water was now part of its territory.\n\nAnd when it decided to move...\n\nthere would be no safe place left in the world.\n\nThe war we had tried to prevent was finally about to begin."
  }
];

let entries=[];let activeIndex=0;

function getTitle(e) { return currentLang === "en" ? e.title_en : e.title_id; }
function getContent(e) { return currentLang === "en" ? e.content_en : e.content_id; }

function escapeHtml(str){return String(str??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function inlineMarkdown(text){let s=escapeHtml(text);s=s.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");s=s.replace(/\*(.+?)\*/g,"<em>$1</em>");return s}
function markdownToHtml(md){const lines=String(md||"").split(/\r?\n/);const out=[];let p=[];function flush(){if(p.length){out.push("<p>"+inlineMarkdown(p.join(" "))+"</p>");p=[]}}for(const raw of lines){const line=raw.trim();if(!line){flush();continue}if(line==="***"||line==="---"){flush();out.push("<hr>");continue}if(line.startsWith("# ")){flush();out.push("<h1>"+inlineMarkdown(line.slice(2))+"</h1>");continue}if(line.startsWith("> ")){flush();out.push("<blockquote>"+inlineMarkdown(line.slice(2))+"</blockquote>");continue}p.push(line)}flush();return out.join("\n")}
function cleanExcerpt(content){return content.replace(/^#.+$/gm,"").replace(/^>\s?/gm,"").replace(/\*\*/g,"").replace(/\*/g,"").replace(/\n+/g," ").trim().slice(0,170)+"…"}

function loadEntries(){
  const saved=localStorage.getItem(STORAGE_KEY);
  if(saved){try{const parsed=JSON.parse(saved);if(Array.isArray(parsed)&&parsed.length){entries=parsed;return}}catch(e){}}
  entries=SEED_ENTRIES;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(entries));
}

function resetToSeed(){
  entries=SEED_ENTRIES;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(entries));
  render();
}

function applyLang(){
  const t=I18N[currentLang];
  document.documentElement.lang=t.htmlLang;
  document.getElementById("eyebrow").textContent=t.eyebrow;
  document.getElementById("subtitle").textContent=t.subtitle;
  document.getElementById("intro").innerHTML=t.intro;
  document.getElementById("disclaimer").textContent=t.disclaimer;
  document.getElementById("search").placeholder=t.search;
  document.getElementById("prevBtn").textContent=t.prev;
  document.getElementById("nextBtn").textContent=t.next;
  document.getElementById("langId").classList.toggle("active",currentLang==="id");
  document.getElementById("langEn").classList.toggle("active",currentLang==="en");
}

function setLang(lang){
  currentLang=lang;
  localStorage.setItem(LANG_KEY,lang);
  applyLang();
  render();
  if(document.getElementById("readerOverlay").classList.contains("open")) openReader(activeIndex);
}

function render(){
  const t=I18N[currentLang];
  const q=document.getElementById("search").value.trim().toLowerCase();
  const list=entries.slice().sort((a,b)=>a.chapter-b.chapter).filter(e=>!q||getTitle(e).toLowerCase().includes(q)||getContent(e).toLowerCase().includes(q));
  document.getElementById("stats").innerHTML=t.stats(entries.length);
  const c=document.getElementById("entries");
  if(!list.length){c.innerHTML=`<div class="empty">${escapeHtml(t.empty)}</div>`;return}
  c.innerHTML=list.map(e=>`<div class="entry" data-id="${escapeHtml(e.id)}"><div class="entry-top"><span class="chapter-no">${t.chapter} ${String(e.chapter).padStart(2,"0")}</span></div><h3 class="entry-title">${escapeHtml(getTitle(e))}</h3><p class="entry-excerpt">${escapeHtml(cleanExcerpt(getContent(e)))}</p></div>`).join("");
  c.querySelectorAll(".entry").forEach(card=>{card.addEventListener("click",()=>openReaderById(card.dataset.id))})
}

function openReaderById(id){const sorted=entries.slice().sort((a,b)=>a.chapter-b.chapter);const idx=sorted.findIndex(e=>e.id===id);if(idx>=0)openReader(idx)}
function openReader(idx){const t=I18N[currentLang];const sorted=entries.slice().sort((a,b)=>a.chapter-b.chapter);activeIndex=Math.max(0,Math.min(idx,sorted.length-1));const e=sorted[activeIndex];document.getElementById("readerMeta").textContent=`${t.chapter} ${String(e.chapter).padStart(2,"0")}`;document.getElementById("readerTitle").textContent=getTitle(e);document.getElementById("readerBody").innerHTML=markdownToHtml(getContent(e));document.getElementById("prevBtn").disabled=activeIndex===0;document.getElementById("nextBtn").disabled=activeIndex===sorted.length-1;document.getElementById("readerOverlay").classList.add("open");document.body.style.overflow="hidden";document.getElementById("readerOverlay").scrollTo({top:0,behavior:"smooth"})}
function closeReader(){document.getElementById("readerOverlay").classList.remove("open");document.body.style.overflow=""}

document.getElementById("langId").addEventListener("click",()=>setLang("id"));
document.getElementById("langEn").addEventListener("click",()=>setLang("en"));
document.getElementById("search").addEventListener("input",render);
document.getElementById("closeReader").addEventListener("click",closeReader);
document.getElementById("readerOverlay").addEventListener("click",e=>{if(e.target.id==="readerOverlay")closeReader()});
document.getElementById("prevBtn").addEventListener("click",()=>openReader(activeIndex-1));
document.getElementById("nextBtn").addEventListener("click",()=>openReader(activeIndex+1));
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeReader();if(document.getElementById("readerOverlay").classList.contains("open")){if(e.key==="ArrowLeft")openReader(activeIndex-1);if(e.key==="ArrowRight")openReader(activeIndex+1)}});

loadEntries();
applyLang();
render();
</script>
</body>
</html>
